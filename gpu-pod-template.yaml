apiVersion: v1
kind: Pod
metadata:
  name: ${POD_NAME}
  labels:
    app: ${POD_NAME}
    kueue.x-k8s.io/queue-name: lq-lab-a
spec:
  runtimeClassName: nvidia
  containers:
  - name: main-env
    image: ${IMAGE}
    command: ["/bin/bash", "-c"]
    args:
      - |
        apt-get update && apt-get install -y openssh-server
        mkdir /var/run/sshd
        echo "root:${ROOT_PASSWORD}" | chpasswd
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        /usr/sbin/sshd -D
    resources:
      limits:
        nvidia.com/gpu: ${GPU_COUNT}
        cpu: "${CPU_LIMIT}"
        memory: "${MEM_LIMIT}Gi"
  volumes:
  - name: workspace
    persistentVolumeClaim:
      claimName: ${PVC_NAME}
---
apiVersion: v1
kind: Service
metadata:
  name: ${POD_NAME}-svc
spec:
  type: NodePort
  selector:
    app: ${POD_NAME}
  ports:
  - port: 22
    targetPort: 22
